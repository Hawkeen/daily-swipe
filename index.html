<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Swipe — Library</title>
<!-- Home-screen app install -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0b0d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Swipe">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b0b0d; color: #fff;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  a { color: inherit; }

  /* ---------- shared shell ---------- */
  .wrap { max-width: 540px; margin: 0 auto; min-height: 100%;
          display: flex; flex-direction: column;
          padding: calc(22px + env(safe-area-inset-top)) 20px
                   calc(28px + env(safe-area-inset-bottom)); }

  /* ---------- home ---------- */
  .brand { font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
           color: rgba(255,255,255,.5); }
  h1 { font-size: clamp(30px, 8vw, 44px); line-height: 1.05; margin: 10px 0 6px;
       font-weight: 800; letter-spacing: -0.02em; }
  .sub { color: rgba(255,255,255,.6); font-size: 15px; margin-bottom: 30px; }
  .count b { color: #fff; }

  .draw {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 20px; border: none; border-radius: 18px; cursor: pointer;
    font-size: 19px; font-weight: 700; color: #0b0b0d;
    background: linear-gradient(135deg,#fff, #d8d8de);
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .draw:active { transform: scale(.98); box-shadow: 0 4px 16px rgba(0,0,0,.5); }
  .draw .emoji { font-size: 22px; }
  .progress { text-align: center; color: rgba(255,255,255,.4); font-size: 12.5px;
              margin-top: 12px; letter-spacing: .02em; }

  .row { display: flex; align-items: center; gap: 12px; margin: 34px 0 14px; }
  .row h2 { font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
            color: rgba(255,255,255,.5); margin: 0; flex: 1; }
  .row .reset { font-size: 12px; color: rgba(255,255,255,.4);
                background: none; border: none; cursor: pointer; }

  /* ---------- library list ---------- */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 15px 16px; border-radius: 15px; cursor: pointer; text-align: left;
    background: #15151a; border: 1px solid rgba(255,255,255,.06);
    transition: background .12s ease, transform .12s ease;
  }
  .item:active { transform: scale(.99); background: #1c1c23; }
  .item .ic { font-size: 24px; line-height: 1.2; flex: 0 0 auto; }
  .item .body { min-width: 0; flex: 1; }
  .item .t { font-weight: 700; font-size: 16.5px; margin-bottom: 3px; }
  .item .meta { font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase;
                color: rgba(255,255,255,.42); margin-bottom: 6px; }
  .item .d { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,.62);
             display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
             overflow: hidden; }
  .item.seen .ic, .item.seen .t { opacity: .5; }
  .item .tick { color: #6ee7a8; font-size: 12px; margin-left: 6px; }

  /* ---------- player overlay ---------- */
  .player { position: fixed; inset: 0; background: #0b0b0d; z-index: 50;
            display: none; flex-direction: column; }
  .player.on { display: flex; }
  .bar { display: flex; align-items: center; gap: 8px;
         padding: calc(8px + env(safe-area-inset-top)) 10px 8px;
         background: #0b0b0d; border-bottom: 1px solid rgba(255,255,255,.07); }
  .bar button { background: #1a1a20; color: #fff; border: 1px solid rgba(255,255,255,.1);
                border-radius: 11px; padding: 9px 13px; font-size: 14px; font-weight: 600;
                cursor: pointer; white-space: nowrap; }
  .bar button:active { background: #25252e; }
  .bar .label { flex: 1; min-width: 0; font-size: 13px; color: rgba(255,255,255,.55);
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
  .bar .again { background: #fff; color: #0b0b0d; border-color: #fff; }
  iframe { flex: 1; width: 100%; border: 0; background: #0b0b0d; }

  .err { color: #ff8f8f; font-size: 14px; margin-top: 20px; }

  /* ---------- toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: calc(32px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(12px);
    background: rgba(28,28,35,.96); color: #fff;
    padding: 13px 20px; border-radius: 14px; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255,255,255,.12); box-shadow: 0 8px 30px rgba(0,0,0,.5);
    opacity: 0; pointer-events: none; z-index: 60;
    transition: opacity .2s ease, transform .2s ease; white-space: nowrap;
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="wrap" id="home">
    <div class="brand">Daily Swipe</div>
    <h1>Your Library</h1>
    <div class="sub count" id="count">Loading…</div>

    <button class="draw" id="drawBtn" onclick="drawNext()">
      <span class="emoji">⏳</span> Draw a swipe
    </button>
    <div class="progress" id="progress"></div>

    <div class="row">
      <h2>Browse all</h2>
      <button class="reset" onclick="resetSeen()">Reset progress</button>
    </div>
    <div class="list" id="list"></div>
    <div class="err" id="err"></div>
  </div>

  <div class="player" id="player">
    <div class="bar">
      <button onclick="closePlayer()">‹ Library</button>
      <div class="label" id="plabel"></div>
      <button class="again" onclick="drawNext()">↻ Another</button>
    </div>
    <iframe id="frame" title="Swipe"></iframe>
  </div>

  <div class="toast" id="toast"></div>

<script>
const REPO = "Hawkeen/daily-swipe";      // used only for optional auto-refresh
const SEEN_KEY = "ds_seen_v1";
let SWIPES = [];

const seen = () => { try { return JSON.parse(localStorage.getItem(SEEN_KEY)) || []; }
                     catch(e){ return []; } };
const setSeen = a => localStorage.setItem(SEEN_KEY, JSON.stringify(a));

function deriveFromName(file){
  const t = file.replace(/^Swipe\s*[–-]\s*/, "").replace(/\.html$/i, "")
               .replace(/\s*[–-]\s*\d{4}-\d{2}-\d{2}\s*$/, "");
  const d = (file.match(/(\d{4}-\d{2}-\d{2})/) || [])[1] || "";
  return { file, title: t || file, date: d, kicker: "", emoji: "📄", description: "" };
}

async function load(){
  // 1) committed manifest (always available, rich metadata)
  try {
    const r = await fetch("library.json", {cache:"no-store"});
    const j = await r.json();
    SWIPES = j.swipes || [];
  } catch(e){
    document.getElementById("err").textContent =
      "Couldn't load library.json — is it in the same folder?";
  }
  // 2) optional: pick up brand-new swipes not yet in the manifest
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/`,
                          {headers:{Accept:"application/vnd.github+json"}});
    if (r.ok){
      const files = (await r.json())
        .map(x => x.name)
        .filter(n => /^Swipe\s*[–-].*\.html$/i.test(n));
      const known = new Set(SWIPES.map(s => s.file));
      files.forEach(n => { if(!known.has(n)) SWIPES.push(deriveFromName(n)); });
    }
  } catch(e){ /* offline / rate-limited — manifest is enough */ }

  SWIPES.sort((a,b) => (b.date||"").localeCompare(a.date||""));
  render();
}

function render(){
  document.getElementById("count").innerHTML =
    `<b>${SWIPES.length}</b> swipe${SWIPES.length===1?"":"s"} in your library`;
  const s = new Set(seen());
  const remaining = SWIPES.filter(x => !s.has(x.file)).length;
  document.getElementById("progress").textContent =
    remaining ? `${remaining} unseen left in this round`
              : "Alle Swipes gelesen";

  const list = document.getElementById("list");
  list.innerHTML = "";
  SWIPES.forEach(x => {
    const el = document.createElement("button");
    el.className = "item" + (s.has(x.file) ? " seen" : "");
    el.onclick = () => open(x);
    el.innerHTML =
      `<div class="ic">${x.emoji||"📄"}</div>
       <div class="body">
         <div class="t">${esc(x.title)}${s.has(x.file)?'<span class="tick">✓</span>':''}</div>
         <div class="meta">${esc(x.kicker||"Swipe")} · ${esc(x.date||"")}</div>
         ${x.description?`<div class="d">${esc(x.description)}</div>`:""}
       </div>`;
    list.appendChild(el);
  });
}

function drawNext(){
  if (!SWIPES.length) return;
  const s = seen();
  const pool = SWIPES.filter(x => !s.includes(x.file));
  if (!pool.length){ toast("Alle Swipes gelesen"); return; }   // no reshuffle
  // always draw the OLDEST unseen swipe (undated ones go last)
  const pick = pool.reduce((oldest, x) =>
    (x.date || "9999-99-99") < (oldest.date || "9999-99-99") ? x : oldest);
  open(pick);
}

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("on"), 2200);
}

function open(x){
  if (!seen().includes(x.file)){ const s = seen(); s.push(x.file); setSeen(s); }
  document.getElementById("frame").src = "./" + encodeURIComponent(x.file);
  document.getElementById("plabel").textContent = x.title;
  document.getElementById("player").classList.add("on");
  render();
}

function closePlayer(){
  document.getElementById("player").classList.remove("on");
  document.getElementById("frame").src = "about:blank";
}

function resetSeen(){ setSeen([]); render(); }

function esc(s){ return (s||"").replace(/[&<>"]/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

load();
</script>
</body>
</html>
